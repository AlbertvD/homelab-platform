name: Test Suite

on:
  workflow_call:
    inputs:
      run_unit:
        type: boolean
        default: false
      run_api:
        type: boolean
        default: false
      run_auth:
        type: boolean
        default: false
      run_e2e:
        type: boolean
        default: false
      staging_url:
        type: string
        default: ""
      node_version:
        type: string
        default: "20"
      runner:
        description: 'Runner label (e.g., ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    secrets:
      PLATFORM_TOKEN:
        required: true
      API_URL:
        required: false
      SUPABASE_ANON_KEY:
        required: false
      SUPABASE_SERVICE_KEY:
        required: false
      OPENBRAIN_KEY:
        required: false

jobs:
  placeholder:
    name: Tests (all layers disabled)
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    steps:
      - run: echo "All test layers disabled. Enable by flipping run_unit/run_api/run_auth in ci.yml once staging credentials are added."
