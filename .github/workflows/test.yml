name: Test Suite

on:
  workflow_call:
    inputs:
      run_unit:
        type: boolean
        default: true
      run_api:
        type: boolean
        default: true
      run_auth:
        type: boolean
        default: true
      run_e2e:
        type: boolean
        default: false
      staging_url:
        description: "Base URL for E2E tests"
        type: string
        default: ""
      node_version:
        type: string
        default: "20"
    secrets:
      PLATFORM_TOKEN:
        required: true
      API_URL:
        required: false
      SUPABASE_ANON_KEY:
        required: false
      SUPABASE_SERVICE_KEY:
        required: false
      OPENBRAIN_KEY:
        required: false

jobs:
  unit:
    name: "Layer 1: Unit Tests"
    if: ${{ inputs.run_unit }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - run: npm ci
      - run: npm test

  api-contract:
    name: "Layer 2: API Contract Tests"
    if: ${{ inputs.run_api }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AlbertvD/homelab-platform
          path: .platform
          token: ${{ secrets.PLATFORM_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r .platform/tests/requirements.txt
      - name: Run API contract tests
        env:
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # PYTHONPATH required: conftest.py does `from lib.api_client import APIClient`.
          # Without this, Python can't find lib/ when pytest is invoked from the repo root.
          PYTHONPATH: .platform/tests
        run: pytest .platform/tests/api/ -v --tb=short

  auth:
    name: "Layer 3: Auth & Permissions"
    if: ${{ inputs.run_auth }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AlbertvD/homelab-platform
          path: .platform
          token: ${{ secrets.PLATFORM_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r .platform/tests/requirements.txt
      - name: Run auth tests
        env:
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # PYTHONPATH required: same reason as api-contract job above.
          PYTHONPATH: .platform/tests
        run: pytest .platform/tests/auth/ -v --tb=short

  e2e:
    name: "Layer 4: E2E Customer Journeys"
    if: ${{ inputs.run_e2e && inputs.staging_url != '' }}
    needs: auth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AlbertvD/homelab-platform
          path: .platform
          token: ${{ secrets.PLATFORM_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node_version }}
      - name: Install Playwright
        working-directory: .platform/tests/e2e
        run: |
          npm ci
          npx playwright install --with-deps chromium
      - name: Run E2E tests
        working-directory: .platform/tests/e2e
        env:
          BASE_URL: ${{ inputs.staging_url }}
          API_URL: ${{ secrets.API_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          # TEST_SERVICE_KEY: used by signup test cleanup to delete E2E-created users.
          # Optional — test still passes without it, orphan users just accumulate.
          TEST_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: .platform/tests/e2e/playwright-report/

  capture-failure:
    name: Capture Test Failure
    # needs all test layers so failure() sees their state.
    # Skipped jobs (if: false) count as "success" for needs: purposes — safe.
    if: failure()
    needs: [unit, api-contract, auth, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: AlbertvD/homelab-platform
          path: .platform
          token: ${{ secrets.PLATFORM_TOKEN }}
      - name: Capture to OpenBrain
        env:
          OPENBRAIN_URL: ${{ vars.OPENBRAIN_URL }}
          OPENBRAIN_KEY: ${{ secrets.OPENBRAIN_KEY }}
        run: |
          bash .platform/evals/lesson-capture.sh \
            "${{ github.repository }}" "ci" "bug" \
            "Test suite failed on ${{ github.ref_name }}"
