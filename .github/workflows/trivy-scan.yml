name: Trivy Container Scan

on:
  workflow_call:
    inputs:
      image:
        description: 'Container image to scan (e.g., ghcr.io/org/app:latest)'
        required: false
        type: string
      dockerfile_path:
        description: 'Path to Dockerfile for filesystem scan (alternative to image)'
        required: false
        type: string
      severity:
        description: 'Minimum severity to report (UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL)'
        required: false
        default: 'HIGH,CRITICAL'
        type: string
      fail_on_vulnerabilities:
        description: 'Fail workflow if vulnerabilities found'
        required: false
        default: false
        type: boolean
      ignore_unfixed:
        description: 'Ignore vulnerabilities without fixes'
        required: false
        default: true
        type: boolean
  workflow_dispatch:
    inputs:
      image:
        description: 'Container image to scan'
        required: false
        type: string
      severity:
        description: 'Severity filter'
        required: false
        default: 'HIGH,CRITICAL'
        type: string

jobs:
  detect-images:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.find.outputs.images }}
      has_images: ${{ steps.find.outputs.has_images }}
      has_dockerfiles: ${{ steps.find.outputs.has_dockerfiles }}
      dockerfiles: ${{ steps.find.outputs.dockerfiles }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Detect scannable targets
        id: find
        env:
          INPUT_IMAGE: ${{ inputs.image }}
        run: |
          # If explicit image provided, use that
          if [ -n "$INPUT_IMAGE" ]; then
            echo "images=[\"$INPUT_IMAGE\"]" >> $GITHUB_OUTPUT
            echo "has_images=true" >> $GITHUB_OUTPUT
            echo "has_dockerfiles=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Find Dockerfiles for filesystem scanning
          DOCKERFILES=$(find . -name "Dockerfile" -not -path "*/node_modules/*" -not -path "*/.git/*" 2>/dev/null | head -20)

          if [ -n "$DOCKERFILES" ]; then
            JSON_ARRAY=$(echo "$DOCKERFILES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "dockerfiles=$JSON_ARRAY" >> $GITHUB_OUTPUT
            echo "has_dockerfiles=true" >> $GITHUB_OUTPUT
          else
            echo "has_dockerfiles=false" >> $GITHUB_OUTPUT
            echo "dockerfiles=[]" >> $GITHUB_OUTPUT
          fi

          # Check compose files for image references
          IMAGES=$(grep -rh "image:" . --include="compose.yml" --include="docker-compose.yml" 2>/dev/null | \
            grep -oP 'image:\s*\K[^\s]+' | \
            grep -v '\${' | \
            sort -u | \
            head -20 || true)

          if [ -n "$IMAGES" ]; then
            JSON_ARRAY=$(echo "$IMAGES" | jq -R -s -c 'split("\n") | map(select(length > 0))')
            echo "images=$JSON_ARRAY" >> $GITHUB_OUTPUT
            echo "has_images=true" >> $GITHUB_OUTPUT
          else
            echo "has_images=false" >> $GITHUB_OUTPUT
            echo "images=[]" >> $GITHUB_OUTPUT
          fi

  scan-dockerfiles:
    needs: detect-images
    if: needs.detect-images.outputs.has_dockerfiles == 'true'
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.fail_on_vulnerabilities }}
    strategy:
      fail-fast: false
      matrix:
        dockerfile: ${{ fromJson(needs.detect-images.outputs.dockerfiles) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Run Trivy filesystem scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.69.3 - pinned due to supply chain compromise in v0.69.4
        with:
          scan-type: 'fs'
          scan-ref: ${{ matrix.dockerfile }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: 'table'
          output: 'trivy-results.txt'

      - name: Output results
        env:
          DOCKERFILE: ${{ matrix.dockerfile }}
        run: |
          echo "### Trivy Scan: \`$DOCKERFILE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s trivy-results.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  scan-images:
    needs: detect-images
    if: needs.detect-images.outputs.has_images == 'true'
    runs-on: ubuntu-latest
    continue-on-error: ${{ !inputs.fail_on_vulnerabilities }}
    permissions:
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image: ${{ fromJson(needs.detect-images.outputs.images) }}
    steps:
      - name: Log in to ghcr.io for private images
        # Required for Trivy to pull private images from GitHub Container Registry.
        # Skipped for non-ghcr.io images. continue-on-error keeps public-image
        # scans working even if the caller workflow hasn't granted packages:read.
        if: startsWith(matrix.image, 'ghcr.io/')
        uses: docker/login-action@3d100841f68d4548bf57e52eb27bd33ec5069f55 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Run Trivy image scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.69.3 - pinned due to supply chain compromise in v0.69.4
        with:
          image-ref: ${{ matrix.image }}
          severity: ${{ inputs.severity }}
          ignore-unfixed: ${{ inputs.ignore_unfixed }}
          format: 'table'
          output: 'trivy-results.txt'

      - name: Output results
        env:
          IMAGE: ${{ matrix.image }}
        run: |
          echo "### Trivy Scan: \`$IMAGE\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -s trivy-results.txt ]; then
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            cat trivy-results.txt >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
          fi

  summary:
    needs: [detect-images, scan-dockerfiles, scan-images]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Scan Summary
        env:
          HAS_DOCKERFILES: ${{ needs.detect-images.outputs.has_dockerfiles }}
          HAS_IMAGES: ${{ needs.detect-images.outputs.has_images }}
          DOCKERFILE_RESULT: ${{ needs.scan-dockerfiles.result }}
          IMAGE_RESULT: ${{ needs.scan-images.result }}
        run: |
          echo "## Trivy Container Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "$HAS_DOCKERFILES" == "true" ]; then
            if [ "$DOCKERFILE_RESULT" == "success" ]; then
              echo "| Dockerfiles | Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Dockerfiles | $DOCKERFILE_RESULT |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Dockerfiles | Skipped (none found) |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "$HAS_IMAGES" == "true" ]; then
            if [ "$IMAGE_RESULT" == "success" ]; then
              echo "| Container Images | Passed |" >> $GITHUB_STEP_SUMMARY
            else
              echo "| Container Images | $IMAGE_RESULT |" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "| Container Images | Skipped (none found) |" >> $GITHUB_STEP_SUMMARY
          fi
