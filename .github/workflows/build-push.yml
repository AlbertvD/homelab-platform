name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      context:
        description: "Docker build context directory"
        type: string
        required: true
      dockerfile:
        description: "Path to Dockerfile"
        type: string
        required: true
      image_name:
        description: "Image name (without registry prefix)"
        type: string
        required: true
      registry:
        description: "Container registry prefix (e.g. ghcr.io/albertvd/homelab-configs)"
        type: string
        default: "ghcr.io/albertvd/homelab-configs"
      registry_host:
        description: "Registry host for docker/login-action (e.g. ghcr.io, docker.io). Must match the host in 'registry'."
        type: string
        default: "ghcr.io"
      tags:
        description: "Additional tags (newline-separated)"
        type: string
        default: ""
      build_args:
        description: "Build args (newline-separated KEY=VALUE)"
        type: string
        default: ""
      required_build_args:
        description: "Comma-separated list of build arg names that must be non-empty"
        type: string
        default: ""
    secrets:
      GITHUB_TOKEN:
        required: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate required build args
        if: ${{ inputs.required_build_args != '' }}
        env:
          BUILD_ARGS: ${{ inputs.build_args }}
          REQUIRED: ${{ inputs.required_build_args }}
        run: |
          IFS=',' read -ra REQUIRED_ARGS <<< "$REQUIRED"
          FAILED=0
          for arg_name in "${REQUIRED_ARGS[@]}"; do
            arg_name=$(echo "$arg_name" | xargs)  # trim whitespace
            value=$(echo "$BUILD_ARGS" | grep "^${arg_name}=" | cut -d'=' -f2- || true)
            if [ -z "$value" ]; then
              echo "ERROR: Required build arg ''$arg_name'' is empty or missing."
              echo "       This would bake an empty value into the Docker image."
              echo "       Ensure the secret/variable is configured in this repo."
              FAILED=1
            else
              echo "OK: $arg_name is set (${#value} chars)"
            fi
          done
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry_host }}
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          build-args: ${{ inputs.build_args }}
          tags: |
            ${{ inputs.registry }}/${{ inputs.image_name }}:latest
            ${{ inputs.registry }}/${{ inputs.image_name }}:sha-${{ github.sha }}
            ${{ inputs.tags }}
