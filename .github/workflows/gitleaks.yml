# Gitleaks Secret Detection — Scan commits for leaked secrets
# Reusable workflow for CI/CD integration
#
# Usage in caller repo:
#   jobs:
#     secrets:
#       uses: splinterlabs/code-guardian/.github/workflows/gitleaks.yml@main

name: Gitleaks Secret Detection

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      scan_depth:
        description: 'How many commits to scan (0 = all history, default = since base branch)'
        required: false
        type: number
        default: 0
      fail_on_leak:
        description: 'Fail workflow if secrets detected'
        required: false
        type: boolean
        default: true
      config_path:
        description: 'Path to custom .gitleaks.toml config (relative to repo root)'
        required: false
        type: string
        default: ''
      baseline_path:
        description: 'Path to .gitleaks-baseline.json for known/accepted findings'
        required: false
        type: string
        default: ''
      runner:
        description: 'Runner label (e.g., ubuntu-latest or self-hosted)'
        required: false
        type: string
        default: 'ubuntu-latest'
    outputs:
      findings_count:
        description: 'Number of potential secrets found'
        value: ${{ jobs.gitleaks.outputs.findings_count }}

jobs:
  gitleaks:
    name: Secret Detection
    runs-on: ${{ inputs.runner || 'ubuntu-latest' }}
    timeout-minutes: 10

    outputs:
      findings_count: ${{ steps.scan.outputs.findings_count }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0  # Full history for comprehensive scanning

      - name: Determine scan scope
        id: scope
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          SHA: ${{ github.sha }}
          SCAN_DEPTH: ${{ inputs.scan_depth }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            # PR: scan only changed commits
            echo "log_opts=origin/$BASE_REF..$SHA" >> $GITHUB_OUTPUT
            echo "mode=PR commits" >> $GITHUB_OUTPUT
          elif [[ "$SCAN_DEPTH" -gt 0 ]]; then
            # Limited depth
            echo "log_opts=HEAD~$SCAN_DEPTH..HEAD" >> $GITHUB_OUTPUT
            echo "mode=Last $SCAN_DEPTH commits" >> $GITHUB_OUTPUT
          else
            # Full history
            echo "log_opts=" >> $GITHUB_OUTPUT
            echo "mode=Full history" >> $GITHUB_OUTPUT
          fi

      - name: Run Gitleaks
        id: scan
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true

      - name: Parse results
        id: parse
        if: always()
        run: |
          # Check if report exists
          if [[ -f "gitleaks-report.json" ]]; then
            FINDINGS=$(jq 'length' gitleaks-report.json 2>/dev/null || echo "0")
          else
            FINDINGS=0
          fi

          echo "findings_count=$FINDINGS" >> $GITHUB_OUTPUT

          if [[ "$FINDINGS" -gt 0 ]]; then
            echo "::warning::Gitleaks found $FINDINGS potential secret(s)"
            echo ""
            echo "=== Findings Summary ==="
            jq -r '.[] | "- \(.RuleID): \(.File):\(.StartLine)"' gitleaks-report.json 2>/dev/null || true
          else
            echo "No secrets detected"
          fi

      - name: Upload scan report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json
          retention-days: 30
          if-no-files-found: ignore

      - name: Fail on findings
        if: inputs.fail_on_leak && steps.parse.outputs.findings_count > 0
        env:
          FINDINGS_COUNT: ${{ steps.parse.outputs.findings_count }}
        run: |
          echo "::error::Gitleaks detected $FINDINGS_COUNT potential secret(s)"
          echo ""
          echo "Review the gitleaks-report artifact for details."
          echo ""
          echo "If these are false positives, you can:"
          echo "1. Add to .gitleaksignore with commit hash + rule ID"
          echo "2. Add inline comment: // gitleaks:allow"
          echo "3. Create a baseline file and pass baseline_path input"
          exit 1

